<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edward Johnson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/vde1hxg.css">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'neue-haas-grotesk-display', 'Inter', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadein 1.2s ease forwards;
      animation-delay: 0.3s;
    }

    .title {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .email {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #fff;
      text-decoration: none;
      position: relative;
      transition: color 0.3s ease;
    }

    .email:hover {
      color: #FF6C5F;
    }

    .email::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 0;
      height: 2px;
      background: #FF6C5F;
      transition: width 0.3s ease;
    }

    .email:hover::after {
      width: 100%;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="title">Under Construction</p>
    <a class="email" href="mailto:eddiej.design@gmail.com">eddiej.design@gmail.com</a>
  </div>
</body>
</html>
